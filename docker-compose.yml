services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cms
      POSTGRES_USER: cms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms -d cms"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Database=cms;Username=cms;Password=${POSTGRES_PASSWORD:-changeme}
      ConnectionStrings__Redis: redis:6379
      Jwt__Key: ${JWT_KEY:?JWT_KEY is required}
      Admin__Username: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      Admin__Password: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      back:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
